<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Dashboard - AI-900</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>

<body class="dashboard-page">

<nav class="navbar">
  <div class="nav-brand">AI-900 Portal</div>
  <div class="nav-right">
    <span id="staff-name">Staff</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dashboard-container">

  <!-- TILES -->
  <div class="tiles">
    <div class="tile">
      <h3 id="totalStudents">0</h3>
      <p>Students</p>
    </div>
    <div class="tile">
      <h3 id="totalMarks">0</h3>
      <p>Marks</p>
    </div>
    <div class="tile">
      <h3 id="avgScore">0</h3>
      <p>Average</p>
    </div>
    <div class="tile">
      <h3 id="topScore">0</h3>
      <p>Top Score</p>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('upload', this)">📤 Upload Mark</button>
    <button class="tab" onclick="showTab('students', this)">➕ Add Student</button>
    <button class="tab" onclick="showTab('allmarks', this)">📊 All Marks</button>
    <button class="tab" onclick="showTab('toppers', this)">🏆 Leaderboard</button>
  </div>

  <!-- UPLOAD MARK -->
  <div id="upload" class="tab-content">
    <div class="card">
      <h3>📤 Upload Mark</h3>
      <div id="upload-msg" class="success-msg hidden"></div>
      <div class="form-group">
        <label>Select Student</label>
        <select id="student-select">
          <option value="">Select Student</option>
        </select>
      </div>
      <div class="form-group">
        <label>Topic</label>
        <input type="text" id="topic" placeholder="e.g. Azure AI Fundamentals"/>
      </div>
      <div class="form-group">
        <label>Score (out of 100)</label>
        <input type="number" id="score" placeholder="e.g. 85" min="0" max="100"/>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="mark-date"/>
      </div>
      <button class="btn-primary" onclick="uploadMark()">Upload Mark</button>
    </div>
  </div>

  <!-- ADD STUDENT -->
  <div id="students" class="tab-content hidden">
    <div class="card">
      <h3>➕ Add New Student</h3>
      <div id="add-msg" class="success-msg hidden"></div>
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" id="sname" placeholder="e.g. Karthik"/>
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="e.g. CS2023001"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="text" id="spass" placeholder="Set a password"/>
      </div>
      <button class="btn-primary" onclick="addStudent()">Add Student</button>
    </div>
  </div>

  <!-- ALL MARKS -->
  <div id="allmarks" class="tab-content hidden">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3>📊 All Marks</h3>
        <button class="btn-download" onclick="downloadReport()">⬇ Download PDF</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Roll No</th>
              <th>Topic</th>
              <th>Score</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="marks-body">
            <tr><td colspan="5" class="loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="toppers" class="tab-content hidden">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3>🏆 Leaderboard</h3>
        <button class="btn-download" onclick="downloadToppers()">⬇ Download PDF</button>
      </div>
      <div id="toppers-list" class="toppers-list">
        <p class="loading">Loading...</p>
      </div>
    </div>
  </div>

</div>

<script>
const API = "http://127.0.0.1:8000";
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

// Auth check
if (!token || role !== "staff") {
  window.location.href = "index.html";
}

document.getElementById("staff-name").innerText = localStorage.getItem("name") || "Staff";
document.getElementById("mark-date").value = new Date().toISOString().split("T")[0];

// Load on start
loadStudents();
loadStats();

// ─── TAB SWITCH ───────────────────────────────────────
function showTab(tab, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.getElementById(tab).classList.remove("hidden");
  btn.classList.add("active");

  if (tab === "allmarks") loadAllMarks();
  if (tab === "toppers") loadTop();
}

// ─── LOAD STUDENTS DROPDOWN ───────────────────────────
async function loadStudents() {
  try {
    const res = await fetch(`${API}/marks/students`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    const select = document.getElementById("student-select");
    select.innerHTML = "<option value=''>Select Student</option>";
    data.forEach(s => {
      select.innerHTML += `<option value="${s.id}">${s.name} (${s.roll_number})</option>`;
    });
  } catch (err) {
    console.error("Load students error:", err);
  }
}

// ─── ADD STUDENT ──────────────────────────────────────
async function addStudent() {
  const name = document.getElementById("sname").value.trim();
  const roll_number = document.getElementById("roll").value.trim();
  const password = document.getElementById("spass").value.trim();
  const msg = document.getElementById("add-msg");

  if (!name || !roll_number || !password) {
    alert("Please fill all fields!");
    return;
  }

  try {
    const res = await fetch(`${API}/auth/add-student`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, roll_number, password })
    });

    const data = await res.json();

    if (res.ok) {
      msg.textContent = `✅ Student "${name}" added! Roll No: ${roll_number}`;
      msg.classList.remove("hidden");
      document.getElementById("sname").value = "";
      document.getElementById("roll").value = "";
      document.getElementById("spass").value = "";
      loadStudents();
      loadStats();
      setTimeout(() => msg.classList.add("hidden"), 4000);
    } else {
      alert(data.detail || "Failed to add student!");
    }
  } catch (err) {
    alert("Server error!");
  }
}

// ─── UPLOAD MARK ──────────────────────────────────────
async function uploadMark() {
  const student_id = document.getElementById("student-select").value;
  const topic = document.getElementById("topic").value.trim();
  const score = parseFloat(document.getElementById("score").value);
  const date = document.getElementById("mark-date").value;
  const msg = document.getElementById("upload-msg");

  if (!student_id || !topic || !score || !date) {
    alert("Please fill all fields!");
    return;
  }

  try {
    const res = await fetch(`${API}/marks/upload`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ student_id, topic, score, date })
    });

    if (res.ok) {
      msg.textContent = "✅ Mark uploaded successfully!";
      msg.classList.remove("hidden");
      loadStats();
      setTimeout(() => msg.classList.add("hidden"), 3000);
    } else {
      const data = await res.json();
      alert(data.detail || "Upload failed!");
    }
  } catch (err) {
    alert("Server error!");
  }
}

// ─── LOAD ALL MARKS ───────────────────────────────────
async function loadAllMarks() {
  try {
    const res = await fetch(`${API}/marks/all`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    const tbody = document.getElementById("marks-body");
    tbody.innerHTML = "";

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="loading">No marks found</td></tr>';
      return;
    }

    data.forEach(m => {
      tbody.innerHTML += `
        <tr>
          <td>${m.users?.name || "—"}</td>
          <td>${m.users?.roll_number || "—"}</td>
          <td>${m.topic}</td>
          <td><span class="score-badge">${m.score}</span></td>
          <td>${m.date}</td>
        </tr>`;
    });

    window._marksData = data;
  } catch (err) {
    console.error("Load marks error:", err);
  }
}

// ─── LOAD LEADERBOARD ─────────────────────────────────
async function loadTop() {
  try {
    const res = await fetch(`${API}/marks/top-performers`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    const list = document.getElementById("toppers-list");
    list.innerHTML = "";
    const medals = ["🥇", "🥈", "🥉"];

    data.forEach((t, i) => {
      list.innerHTML += `
        <div class="topper-item">
          <span class="rank">${medals[i] || "#" + (i + 1)}</span>
          <span class="topper-name">${t.users?.name || "Unknown"}</span>
          <span class="topper-roll">${t.users?.roll_number || ""}</span>
          <span class="topper-score">${t.score} pts</span>
        </div>`;
    });

    window._toppersData = data;
  } catch (err) {
    console.error("Load toppers error:", err);
  }
}

// ─── LOAD STATS (TILES) ───────────────────────────────
async function loadStats() {
  try {
    const res = await fetch(`${API}/marks/stats`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    document.getElementById("totalStudents").innerText = data.total_students;
    document.getElementById("totalMarks").innerText = data.total_marks;
    document.getElementById("avgScore").innerText = data.avg_score;
    document.getElementById("topScore").innerText = data.top_score;
  } catch (err) {
    console.error("Stats error:", err);
  }
}

// ─── DOWNLOAD PDF REPORT ──────────────────────────────
function downloadReport() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("AI-900 Training Portal — Marks Report", 14, 20);
  doc.setFontSize(11);
  doc.text(`Generated: ${new Date().toLocaleDateString()}`, 14, 28);

  const rows = (window._marksData || []).map(m => [
    m.users?.name || "—",
    m.users?.roll_number || "—",
    m.topic,
    m.score,
    m.date
  ]);

  doc.autoTable({
    head: [["Name", "Roll No", "Topic", "Score", "Date"]],
    body: rows,
    startY: 35,
    styles: { fontSize: 9 },
    headStyles: { fillColor: [37, 99, 235] }
  });

  doc.save("AI900_Marks_Report.pdf");
}

// ─── DOWNLOAD TOPPERS PDF ─────────────────────────────
function downloadToppers() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("AI-900 Training Portal — Top Performers", 14, 20);

  const rows = (window._toppersData || []).map((p, i) => [
    i + 1,
    p.users?.name || "—",
    p.users?.roll_number || "—",
    p.score
  ]);

  doc.autoTable({
    head: [["Rank", "Name", "Roll No", "Score"]],
    body: rows,
    startY: 30,
    headStyles: { fillColor: [245, 158, 11] }
  });

  doc.save("AI900_Top_Performers.pdf");
}

// ─── LOGOUT ───────────────────────────────────────────
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
