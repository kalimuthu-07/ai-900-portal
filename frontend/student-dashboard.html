<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard - AI-900</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="dashboard-page">

  <nav class="navbar">
    <div class="nav-brand">AI-900 Portal</div>
    <div class="nav-right">
      <span id="student-name">Student</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('mymarks')">📊 My Marks</button>
      <button class="tab" onclick="showTab('leaderboard')">🏆 Leaderboard</button>
    </div>

    <!-- My Marks Tab -->
    <div id="mymarks" class="tab-content active">
      <div class="card">
        <h3>My Marks</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Topic</th>
                <th>Score</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="my-marks-body">
              <tr><td colspan="3" class="loading">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="avg-score" class="avg-score-box hidden"></div>
      </div>
    </div>

    <!-- Leaderboard Tab -->
    <div id="leaderboard" class="tab-content hidden">
      <div class="card">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboard-list" class="toppers-list">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const API = "http://127.0.0.1:8000"; // Change after deploy
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "student") {
      window.location.href = "index.html";
    }

    document.getElementById("student-name").textContent = localStorage.getItem("name") || "Student";

    loadMyMarks();

    async function loadMyMarks() {
      const res = await fetch(`${API}/marks/my-marks`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      const tbody = document.getElementById("my-marks-body");
      tbody.innerHTML = "";

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="loading">No marks yet</td></tr>';
        return;
      }

      let total = 0;
      data.forEach(m => {
        total += m.score;
        tbody.innerHTML += `
          <tr>
            <td>${m.topic}</td>
            <td><span class="score-badge">${m.score}</span></td>
            <td>${m.date}</td>
          </tr>`;
      });

      const avg = (total / data.length).toFixed(1);
      const avgBox = document.getElementById("avg-score");
      avgBox.textContent = `📈 Your Average Score: ${avg} / 100`;
      avgBox.classList.remove("hidden");
    }

    async function loadLeaderboard() {
      const res = await fetch(`${API}/marks/leaderboard`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      const list = document.getElementById("leaderboard-list");
      list.innerHTML = "";
      data.forEach((p, i) => {
        const medals = ["🥇", "🥈", "🥉"];
        list.innerHTML += `
          <div class="topper-item">
            <span class="rank">${medals[i] || `#${i + 1}`}</span>
            <span class="topper-name">${p.users?.name || "Unknown"}</span>
            <span class="topper-score">${p.score} pts</span>
          </div>`;
      });
    }

    function showTab(tab) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.getElementById(tab).classList.remove("hidden");
      event.target.classList.add("active");
      if (tab === "leaderboard") loadLeaderboard();
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
